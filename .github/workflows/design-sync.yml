name: Design Sync — Figma via Claude

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  generate-design:
    # Only run when the issue has the 'design-spec' label
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'design-spec')) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'design-spec') &&
       github.event.comment.body == '/design sync')

    runs-on: ubuntu-latest

    permissions:
      issues: write # needed to post the Figma URL comment back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_TEAM_ID: ${{ vars.FIGMA_TEAM_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "Missing required secret: ANTHROPIC_API_KEY"; exit 1; }
          test -n "$FIGMA_ACCESS_TOKEN" || { echo "Missing required secret: FIGMA_ACCESS_TOKEN"; exit 1; }
          test -n "$GITHUB_TOKEN" || { echo "Missing required secret: GITHUB_TOKEN"; exit 1; }
          test -n "$ISSUE_NUMBER" || { echo "Missing required environment variable: ISSUE_NUMBER"; exit 1; }
          test -n "$ISSUE_TITLE" || { echo "Missing required environment variable: ISSUE_TITLE"; exit 1; }
          test -n "$ISSUE_BODY" || { echo "Missing required environment variable: ISSUE_BODY"; exit 1; }
          test -n "$REPO_FULL_NAME" || { echo "Missing required environment variable: REPO_FULL_NAME"; exit 1; }

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Design Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_TEAM_ID: ${{ vars.FIGMA_TEAM_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python scripts/design_agent.py
